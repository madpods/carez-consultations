<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carez Consultations — Restorative Justice for Schools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    background: #FDFCFB;
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    color: #2C1F1A;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #F7F4F0; }
  ::-webkit-scrollbar-thumb { background: #C4BAB0; border-radius: 99px; }
  p { text-wrap: pretty; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="TrainingsPage.jsx"></script>
<script type="text/babel" src="ContactPage.jsx"></script>

<script type="text/babel">
function App() {
  const [page, setPage] = React.useState('home');

  const navigate = (p) => {
    if (p === page) return;
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 80);
  };

  React.useEffect(() => {
    if (window.lucide) lucide.createIcons();
  });

  const pageComponents = {
    home: <HomePage onNavigate={navigate} />,
    trainings: <TrainingsPage onNavigate={navigate} />,
    contact: <ContactPage onNavigate={navigate} />,
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Nav currentPage={page} onNavigate={navigate} />
      <main style={{ flex: 1 }}>
        <PageTransition pageKey={page}>
          {pageComponents[page] || pageComponents.home}
        </PageTransition>
      </main>
      <Footer onNavigate={navigate} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
